<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Submitted | Lumina</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: #0c0c0c;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .box {
            background: #111;
            padding: 50px;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: #d4af37;
            margin-bottom: 15px;
        }

        p {
            color: #aaa;
            line-height: 1.6;
        }

        .btn {
            margin-top: 25px;
            display: inline-block;
            padding: 12px 25px;
            border: 1px solid #d4af37;
            color: #d4af37;
            text-decoration: none;
            transition: 0.3s ease;
        }

        .btn:hover {
            background: #d4af37;
            color: #000;
        }

        .check {
            font-size: 40px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div class="box">
    <div class="check">✅</div>

    <h1>Review Submitted</h1>

    <p>
        Thanks for sharing your experience at <b>Lumina</b>.  
        Your feedback helps us improve and keep the standard high.
    </p>

    <p>
        We appreciate your time — our team may review your submission if needed.
    </p>

    <a class="btn" href="/">Return to Home</a>
</div>

</body>
</html>
